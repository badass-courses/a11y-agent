name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          test -d dist/claude-code/.claude/skills/a11y-agent
          test -d dist/cursor/.cursor/skills/a11y-audit
          test -d dist/gemini/.gemini/skills/a11y-fix
          echo "✓ Build output verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: a11y-agent-dist
          path: dist/
          retention-days: 7
